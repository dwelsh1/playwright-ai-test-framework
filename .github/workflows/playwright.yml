name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly regression at 2 AM UTC
    - cron: '0 2 * * *'

# Action pins below use Node 24 runtimes (v4 actions used Node 20 — deprecated on GitHub-hosted runners).
env:
  CI: true
  APP_URL: ${{ vars.APP_URL || 'http://localhost:5273' }}
  API_URL: ${{ vars.API_URL || 'http://localhost:3002' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run lint

  smoke:
    name: Smoke Tests (Sauce Demo)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      # Install browsers on the runner instead of using mcr.microsoft.com/playwright:* job containers.
      # GitHub-hosted runners sometimes fail to pull from MCR ("The request is blocked" / access denied).
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build smart reporter
        run: npm run build:smart-reporter
      - name: Run Sauce Demo smoke suite (public AUT)
        run: npx playwright test --project=sauce-demo
        env:
          ENABLE_AI_RECOMMENDATIONS: 'false'
          # Unset/empty repo var falls back in playwright.config.ts (trim + default URL)
          SAUCE_DEMO_URL: ${{ vars.SAUCE_DEMO_URL }}
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: smoke-traces
          path: test-results/
          retention-days: 7

  regression:
    name: Regression Tests (shard ${{ matrix.shard }})
    needs: lint
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - uses: actions/checkout@v5
        with:
          repository: dwelsh1/coffee-cart
          path: coffee-cart
      - name: Install toolchain for Coffee Cart (better-sqlite3 / node-gyp)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential
      - name: Install and start Coffee Cart
        working-directory: coffee-cart
        run: |
          npm ci
          nohup node server/index.js > /tmp/coffee-cart-api.log 2>&1 &
          nohup npm run dev > /tmp/coffee-cart-vite.log 2>&1 &
      - name: Wait for SUT to be ready
        run: |
          echo "Waiting for application to be ready..."
          curl --retry 20 --retry-delay 3 --retry-connrefused \
               --fail --silent --output /dev/null \
               "${API_URL}/api/coffees"
          curl --retry 20 --retry-delay 3 --retry-connrefused \
               --fail --silent --output /dev/null \
               "${APP_URL}/"
          echo "Application is ready."
      - name: Build smart reporter
        run: npm run build:smart-reporter
      - name: Run regression tests (shard ${{ matrix.shard }})
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }} --reporter=blob
        env:
          ENABLE_AI_RECOMMENDATIONS: 'false'
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge Reports
    # Regression is skipped on pull_request; `!cancelled()` alone still runs this job, leaving no blob artifacts.
    if: github.event_name == 'schedule' || github.event_name == 'push'
    needs: regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge blob reports into HTML, JSON, and JUnit
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/junit.xml
        run: |
          mkdir -p test-results
          npx playwright merge-reports --reporter html ./all-blob-reports
          npx playwright merge-reports --reporter json ./all-blob-reports > test-results/results.json
          npx playwright merge-reports --reporter junit ./all-blob-reports
      - name: Detect flaky tests
        run: node scripts/detect-flaky.js
        continue-on-error: true
      - uses: actions/upload-artifact@v6
        with:
          name: regression-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: regression-junit
          path: test-results/junit.xml
          if-no-files-found: warn
          retention-days: 30
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: flaky-report
          path: test-results/flaky-tests.json
          retention-days: 30

  # Runs only on push to main and schedule — not on pull_request (PRs stay lint + smoke only).
  # continue-on-error: flaky suite may still exit 1 on steps; the workflow is allowed to succeed for merge.
  quarantine:
    name: Quarantined Tests (informational)
    needs: lint
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - uses: actions/checkout@v5
        with:
          repository: dwelsh1/coffee-cart
          path: coffee-cart
      - name: Install toolchain for Coffee Cart (better-sqlite3 / node-gyp)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential
      - name: Install and start Coffee Cart
        working-directory: coffee-cart
        run: |
          npm ci
          nohup node server/index.js > /tmp/coffee-cart-api.log 2>&1 &
          nohup npm run dev > /tmp/coffee-cart-vite.log 2>&1 &
      - name: Wait for SUT to be ready
        run: |
          curl --retry 20 --retry-delay 3 --retry-connrefused \
               --fail --silent --output /dev/null \
               "${API_URL}/api/coffees"
          curl --retry 20 --retry-delay 3 --retry-connrefused \
               --fail --silent --output /dev/null \
               "${APP_URL}/"
      - name: Build smart reporter
        run: npm run build:smart-reporter
      # Swallow exit code so flaky failures stay in the HTML report without surfacing a GitHub "exit code 1" annotation.
      - name: Run quarantined tests
        run: npx playwright test --project=chromium --grep "@flaky" --retries=3 || true
        env:
          ENABLE_AI_RECOMMENDATIONS: 'false'
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: quarantine-report
          path: playwright-report/
          retention-days: 7
